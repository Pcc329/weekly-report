<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案報告中心</title>
    <style>
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .portal-container { text-align: center; background: white; padding: 3rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
        h1 { color: #2c3e50; margin-bottom: 2rem; }
        .nav-button { display: block; padding: 1.2rem; margin: 1rem 0; text-decoration: none; border-radius: 10px; font-weight: bold; transition: all 0.3s; font-size: 1.1rem; }
        .weekly { background: #3498db; color: white; }
        .weekly:hover { background: #2980b9; transform: translateY(-3px); }
        /* 修正了這裡的選擇器 */
        .statusUpdate { background: #2ecc71; color: white; }
        .statusUpdate:hover { background: #27ae60; transform: translateY(-3px); }
        .footer { margin-top: 2rem; color: #95a5a6; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1>📊 專案報告中心</h1>
        <a href="weekly.html" class="nav-button weekly">📅 週報 (每週五更新)</a>
        <a href="statusUpdate.html" class="nav-button statusUpdate">⚡ 即時更新紀錄 (Status Update)</a>
        <div class="footer">請點選上方按鈕查看對應進度</div>
    </div>
</body>
</html>
